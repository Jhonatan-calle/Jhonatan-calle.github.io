<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💌 Sorpresa Para Ti</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: 'Arial', sans-serif;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 50px;
      text-decoration: none;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      font-size: 14px;
      z-index: 10;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .surprise-box {
      background: white;
      border-radius: 15px;
      padding: 80px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.8s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .rose {
      font-size: 100px;
      margin-bottom: 40px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    .stage-direction {
      font-size: 1rem;
      color: #999;
      font-style: italic;
      margin-bottom: 60px;
      letter-spacing: 0.05rem;
    }

    .stage-direction::before {
      content: "[";
      color: #999;
    }

    .stage-direction::after {
      content: "]";
      color: #999;
    }

    .love-message {
      font-family: 'Arial', sans-serif;
      font-size: 2.5rem;
      color: #764ba2;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
      font-weight: 300;
      letter-spacing: 0.05rem;
    }

    @media (max-width: 600px) {
      .surprise-box {
        padding: 60px 20px;
      }

      .rose {
        font-size: 80px;
        margin-bottom: 30px;
      }

      .stage-direction {
        font-size: 0.95rem;
        margin-bottom: 40px;
      }

      .love-message {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">← Volver</a>

  <div class="container">
    <div class="surprise-box">
      <div class="rose">🌹</div>

      <div class="stage-direction">Esperame que te vea</div>

      <div class="love-message">Te amo</div>
    </div>
  </div>
</body>
</html>
