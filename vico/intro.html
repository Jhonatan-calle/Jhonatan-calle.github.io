<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intro - 2 Meses Juntos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Arial', sans-serif;
    }

    .intro-container {
      width: 100%;
      height: 100vh;
      position: relative;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: 5;
    }

    .intro-text {
      position: absolute;
      z-index: 10;
      text-align: center;
      color: white;
      font-family: 'Great Vibes', cursive;
      animation: fadeInUp 1.5s ease-out;
    }

    h1 {
      font-size: 4rem;
      font-weight: 300;
      letter-spacing: 2px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
      margin-bottom: 20px;
    }

    p {
      font-size: 1.5rem;
      letter-spacing: 1px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
      font-family: 'Arial', sans-serif;
      font-weight: 300;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .continue-btn {
      position: absolute;
      bottom: 30px;
      z-index: 10;
      padding: 12px 30px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 50px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .continue-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }
      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="intro-container">
    <video id="introVideo" autoplay muted>
      <source src="videos/intro.mp4" type="video/mp4">
      Tu navegador no soporta videos HTML5
    </video>
    <div class="overlay"></div>
    
    <div class="intro-text">
      <h1>¡Nos Amamos! 💕</h1>
      <p>Feliz por estos primeros 2 meses contigo</p>
    </div>

    <a href="index.html" class="continue-btn" id="continueBtn" style="display: none;">Continuar →</a>
  </div>

  <script>
    const video = document.getElementById('introVideo');
    const continueBtn = document.getElementById('continueBtn');

    // Mostrar botón cuando termine el video
    video.addEventListener('ended', () => {
      continueBtn.style.display = 'inline-block';
    });

    // También permitir clic en el video para continuar
    video.addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    // Si hay error con el video, ir directo a index.html
    video.addEventListener('error', () => {
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
