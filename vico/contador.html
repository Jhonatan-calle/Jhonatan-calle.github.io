<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuestro Contador de Tiempo ⏱️</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: 'Arial', sans-serif;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 50px;
      text-decoration: none;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      font-size: 14px;
      z-index: 10;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .container {
      max-width: 700px;
      width: 100%;
    }

    .counter-box {
      background: white;
      border-radius: 20px;
      padding: 60px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.8s ease;
      text-align: center;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 2.5rem;
      color: #764ba2;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #999;
      font-size: 0.95rem;
      margin-bottom: 40px;
      font-style: italic;
    }

    .time-display {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .time-unit {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .time-value {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .time-label {
      font-size: 0.9rem;
      opacity: 0.9;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .full-time {
      background: #f0f0f0;
      padding: 30px;
      border-radius: 15px;
      margin-bottom: 30px;
    }

    .full-time p {
      color: #333;
      font-size: 1.2rem;
      line-height: 1.8;
      margin-bottom: 15px;
    }

    .full-time p:last-child {
      margin-bottom: 0;
    }

    .message {
      font-family: 'Georgia', serif;
      color: #667eea;
      font-size: 1.1rem;
      font-style: italic;
      margin-top: 30px;
    }

    @media (max-width: 600px) {
      .counter-box {
        padding: 40px 25px;
      }

      h1 {
        font-size: 2rem;
      }

      .time-display {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }

      .time-value {
        font-size: 2rem;
      }

      .full-time {
        padding: 20px;
      }

      .full-time p {
        font-size: 1rem;
      }

      .message {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-btn">← Volver</a>

  <div class="container">
    <div class="counter-box">
      <h1>Nuestro Tiempo</h1>
      <p class="subtitle">Desde el 13 de marzo de 2026</p>

      <div class="time-display">
        <div class="time-unit">
          <div class="time-value" id="years">0</div>
          <div class="time-label">Años</div>
        </div>
        <div class="time-unit">
          <div class="time-value" id="months">0</div>
          <div class="time-label">Meses</div>
        </div>
        <div class="time-unit">
          <div class="time-value" id="weeks">0</div>
          <div class="time-label">Semanas</div>
        </div>
        <div class="time-unit">
          <div class="time-value" id="days">0</div>
          <div class="time-label">Días</div>
        </div>
      </div>

      <div class="full-time">
        <p id="fullTime"></p>
      </div>

      <p class="message">Cada momento contigo es un regalo 💕</p>
    </div>
  </div>

  <script>
    function calculateTime() {
      // Fecha de inicio: 13 de marzo de 2026 a las 22:00 (10 PM)
      const startDate = new Date(2026, 2, 13, 21, 0, 0); // Mes es 0-indexado
      const now = new Date();

      const diff = now - startDate;

      // Calcular unidades de tiempo
      const msPerSecond = 1000;
      const msPerMinute = 60 * msPerSecond;
      const msPerHour = 60 * msPerMinute;
      const msPerDay = 24 * msPerHour;
      const msPerWeek = 7 * msPerDay;
      const msPerMonth = 30.44 * msPerDay; // Promedio
      const msPerYear = 365.25 * msPerDay;

      const years = Math.floor(diff / msPerYear);
      const remainderAfterYears = diff % msPerYear;

      const months = Math.floor(remainderAfterYears / msPerMonth);
      const remainderAfterMonths = remainderAfterYears % msPerMonth;

      const weeks = Math.floor(remainderAfterMonths / msPerWeek);
      const remainderAfterWeeks = remainderAfterMonths % msPerWeek;

      const days = Math.floor(remainderAfterWeeks / msPerDay);

      const hours = Math.floor((diff % msPerDay) / msPerHour);
      const minutes = Math.floor((diff % msPerHour) / msPerMinute);
      const seconds = Math.floor((diff % msPerMinute) / msPerSecond);

      // Actualizar display
      document.getElementById('years').textContent = years;
      document.getElementById('months').textContent = months;
      document.getElementById('weeks').textContent = weeks;
      document.getElementById('days').textContent = days;

      // Texto completo
      let timeText = '';
      if (years > 0) timeText += `${years} año${years > 1 ? 's' : ''} `;
      if (months > 0) timeText += `${months} mes${months > 1 ? 'es' : ''} `;
      if (weeks > 0) timeText += `${weeks} semana${weeks > 1 ? 's' : ''} `;
      if (days > 0) timeText += `${days} día${days > 1 ? 's' : ''}<br>`;
      
      timeText += `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')} horas`;

      document.getElementById('fullTime').innerHTML = timeText;
    }

    // Actualizar al cargar
    calculateTime();

    // Actualizar cada segundo
    setInterval(calculateTime, 1000);
  </script>
</body>
</html>
